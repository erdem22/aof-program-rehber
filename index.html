<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AÖF Program ve Ders Rehberi</title>
<style>
  :root{
    --lacivert:#003D7C;
    --lacivert-2:#0a4d94;
    --altin:#C8A84B;
    --altin-2:#b6953a;
    --bg:#f4f6fa;
    --panel:#ffffff;
    --ink:#1a2433;
    --muted:#64748b;
    --line:#e6eaf1;
    --sb:280px;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{
    font-family:"Segoe UI",system-ui,-apple-system,Roboto,Helvetica,Arial,sans-serif;
    color:var(--ink);background:var(--bg);
    display:flex;flex-direction:column;height:100vh;overflow:hidden;
    -webkit-font-smoothing:antialiased;
  }

  /* ---------- Header ---------- */
  header{
    background:linear-gradient(120deg,var(--lacivert),var(--lacivert-2));
    color:#fff;padding:14px 22px;display:flex;align-items:center;gap:16px;
    flex-shrink:0;box-shadow:0 2px 14px rgba(0,61,124,.25);z-index:30;
  }
  .crest{
    width:44px;height:44px;border-radius:10px;flex-shrink:0;
    background:radial-gradient(circle at 30% 25%,var(--altin),var(--altin-2));
    color:var(--lacivert);font-weight:800;font-size:18px;
    display:flex;align-items:center;justify-content:center;letter-spacing:.5px;
    box-shadow:inset 0 0 0 2px rgba(255,255,255,.35);
  }
  .htitle{display:flex;flex-direction:column;line-height:1.25;min-width:0}
  .htitle b{font-size:18px;font-weight:700;letter-spacing:.2px}
  .htitle span{font-size:12.5px;color:#cdddf2;font-weight:400}
  .hstats{margin-left:auto;display:flex;gap:10px;flex-shrink:0}
  .hstat{
    background:rgba(255,255,255,.10);border:1px solid rgba(255,255,255,.18);
    padding:6px 12px;border-radius:9px;text-align:center;min-width:64px;
  }
  .hstat b{display:block;font-size:17px;color:var(--altin)}
  .hstat span{font-size:10.5px;color:#cdddf2;text-transform:uppercase;letter-spacing:.6px}

  /* ---------- Shell ---------- */
  .shell{flex:1;display:flex;min-height:0}

  /* ---------- Sidebar ---------- */
  .sb{
    width:var(--sb);flex-shrink:0;background:var(--panel);
    border-right:1px solid var(--line);display:flex;flex-direction:column;min-height:0;
  }
  .modebar{display:flex;padding:12px 12px 0;gap:6px}
  .modebar button{
    flex:1;border:none;background:transparent;color:var(--muted);
    font-size:13px;font-weight:600;padding:9px 4px;border-radius:8px 8px 0 0;
    cursor:pointer;position:relative;font-family:inherit;transition:color .15s;
  }
  .modebar button.on{color:var(--lacivert)}
  .modebar button.on::after{
    content:"";position:absolute;left:14%;right:14%;bottom:-1px;height:3px;
    border-radius:3px 3px 0 0;background:var(--altin);
  }
  .sbsearch{padding:12px}
  .sbsearch input{
    width:100%;padding:10px 12px;border:1.5px solid var(--line);border-radius:9px;
    font-size:13.5px;font-family:inherit;color:var(--ink);background:#fafbfd;outline:none;
    transition:border-color .15s,box-shadow .15s;
  }
  .sbsearch input:focus{border-color:var(--lacivert);box-shadow:0 0 0 3px rgba(0,61,124,.10)}

  .filters{display:flex;gap:6px;padding:0 12px 10px}
  .filters button{
    flex:1;border:1.5px solid var(--line);background:#fff;color:var(--muted);
    font-size:12px;font-weight:600;padding:7px 4px;border-radius:8px;cursor:pointer;
    font-family:inherit;transition:.15s;
  }
  .filters button:hover{border-color:#c9d4e3}
  .filters button.on{background:var(--lacivert);border-color:var(--lacivert);color:#fff}

  .listcount{padding:0 16px 6px;font-size:11px;color:var(--muted);
    text-transform:uppercase;letter-spacing:.5px;font-weight:600}

  .list{flex:1;overflow-y:auto;padding:0 8px 14px}
  .pitem{
    padding:10px 12px;border-radius:9px;cursor:pointer;margin-bottom:3px;
    border-left:3px solid transparent;transition:background .12s;
  }
  .pitem:hover{background:#f1f5fb}
  .pitem.on{background:#eaf1fb;border-left-color:var(--lacivert)}
  .pitem .pn{font-size:13px;font-weight:600;line-height:1.35;color:var(--ink)}
  .pitem.on .pn{color:var(--lacivert)}
  .pitem .pm{font-size:11.5px;color:var(--muted);margin-top:3px;display:flex;gap:8px;align-items:center}
  .deg{font-size:10px;font-weight:700;padding:1px 7px;border-radius:20px;letter-spacing:.3px}
  .deg.lis{background:#e8f0fc;color:var(--lacivert)}
  .deg.onl{background:#f3eede;color:var(--altin-2)}

  /* ---------- Course-mode list ---------- */
  .citem{
    padding:9px 12px;border-radius:9px;cursor:pointer;margin-bottom:3px;
    border-left:3px solid transparent;transition:background .12s;
  }
  .citem:hover,.citem.kbd{background:#f1f5fb;border-left-color:var(--altin)}
  .citem .cn{font-size:12.5px;font-weight:600;line-height:1.3}
  .citem .cc{font-size:11px;color:var(--lacivert);font-weight:600;margin-top:2px}
  .citem .cp{font-size:11px;color:var(--muted);margin-top:2px}
  .citem .cy{font-size:10px;font-weight:700;color:#fff;border-radius:5px;padding:1px 6px;display:inline-block}

  .empty{padding:34px 18px;text-align:center;color:var(--muted);font-size:13px;line-height:1.6}

  /* ---------- Main ---------- */
  .main{flex:1;overflow-y:auto;min-width:0;position:relative}
  .welcome{
    height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;
    text-align:center;color:var(--muted);padding:30px;
  }
  .welcome .wc{width:78px;height:78px;border-radius:18px;margin-bottom:18px;
    background:linear-gradient(135deg,var(--lacivert),var(--lacivert-2));
    display:flex;align-items:center;justify-content:center;color:var(--altin);font-size:34px;
    box-shadow:0 10px 30px rgba(0,61,124,.22)}
  .welcome h2{color:var(--ink);font-size:21px;margin-bottom:8px;font-weight:700}
  .welcome p{font-size:14px;max-width:380px;line-height:1.65}

  .ph{
    padding:22px 30px 18px;background:var(--panel);border-bottom:1px solid var(--line);
    position:sticky;top:0;z-index:10;
  }
  .ph h1{font-size:22px;font-weight:700;color:var(--lacivert);line-height:1.25}
  .phmeta{display:flex;flex-wrap:wrap;gap:8px 18px;margin-top:12px;align-items:center}
  .chip{display:flex;align-items:center;gap:6px;font-size:12.5px;color:var(--muted);font-weight:500}
  .chip b{color:var(--ink);font-weight:700}
  .phsearch{margin-top:14px;position:relative;max-width:420px}
  .phsearch input{
    width:100%;padding:9px 12px 9px 34px;border:1.5px solid var(--line);border-radius:9px;
    font-size:13px;font-family:inherit;outline:none;background:#fafbfd;color:var(--ink);
    transition:border-color .15s,box-shadow .15s;
  }
  .phsearch input:focus{border-color:var(--lacivert);box-shadow:0 0 0 3px rgba(0,61,124,.10)}
  .phsearch svg{position:absolute;left:11px;top:50%;transform:translateY(-50%);
    width:15px;height:15px;stroke:var(--muted)}

  .terms{padding:18px 30px 40px}
  .term{margin-bottom:24px}
  .thead{display:flex;align-items:center;gap:10px;margin-bottom:12px}
  .tdot{width:11px;height:11px;border-radius:50%}
  .thead h3{font-size:14px;font-weight:700;color:var(--ink)}
  .thead .tc{font-size:11.5px;color:var(--muted);font-weight:600;
    background:#eef2f8;padding:2px 9px;border-radius:20px}
  .cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:10px}
  .card{
    background:var(--panel);border:1px solid var(--line);border-radius:11px;padding:12px 14px;
    border-left:4px solid var(--cy);transition:transform .12s,box-shadow .12s;
  }
  .card:hover{transform:translateY(-2px);box-shadow:0 8px 20px rgba(20,40,80,.08)}
  .card.hide{display:none}
  .card .dn{font-size:13px;font-weight:600;line-height:1.4;color:var(--ink)}
  .card .dk{font-size:11.5px;font-weight:700;color:var(--cy);margin-top:6px;letter-spacing:.3px}
  mark{background:#fde68a;color:inherit;border-radius:3px;padding:0 1px}

  .noresult{padding:40px;text-align:center;color:var(--muted);font-size:13.5px}

  /* scrollbars */
  .list::-webkit-scrollbar,.main::-webkit-scrollbar{width:9px}
  .list::-webkit-scrollbar-thumb,.main::-webkit-scrollbar-thumb{background:#d3dbe6;border-radius:10px}
  .list::-webkit-scrollbar-thumb:hover,.main::-webkit-scrollbar-thumb:hover{background:#bcc7d6}

  /* mobile */
  .mtoggle{display:none}
  @media(max-width:760px){
    .hstats{display:none}
    .sb{position:fixed;top:0;left:0;bottom:0;z-index:40;transform:translateX(-100%);
      transition:transform .25s;box-shadow:4px 0 24px rgba(0,0,0,.18);padding-top:54px}
    body.nav-open .sb{transform:translateX(0)}
    .mtoggle{display:inline-flex;align-items:center;justify-content:center;
      width:40px;height:40px;border-radius:9px;border:1px solid rgba(255,255,255,.25);
      background:rgba(255,255,255,.10);color:#fff;cursor:pointer;font-size:20px}
    .scrim{display:none;position:fixed;inset:0;background:rgba(0,0,0,.35);z-index:35}
    body.nav-open .scrim{display:block}
    .ph,.terms{padding-left:18px;padding-right:18px}
  }
  @media(prefers-reduced-motion:reduce){*{transition:none!important}}
</style>
</head>
<body>
<header>
  <button class="mtoggle" id="mtoggle" aria-label="Menüyü aç">☰</button>
  <div class="crest">AÖF</div>
  <div class="htitle">
    <b>Program ve Ders Rehberi</b>
    <span>Anadolu Üniversitesi Açıköğretim Fakültesi</span>
  </div>
  <div class="hstats">
    <div class="hstat"><b id="s-prog">0</b><span>Program</span></div>
    <div class="hstat"><b id="s-ders">0</b><span>Ders</span></div>
  </div>
</header>

<div class="shell">
  <aside class="sb">
    <div class="modebar">
      <button id="m-prog" class="on" onclick="setMode('prog')">Programlar</button>
      <button id="m-ders" onclick="setMode('ders')">Ders Ara</button>
    </div>

    <!-- PROGRAM MODE -->
    <div id="pane-prog">
      <div class="sbsearch"><input id="psearch" type="text" placeholder="Program ara…" autocomplete="off"></div>
      <div class="filters">
        <button class="on" data-f="all" onclick="setFilter('all')">Tümü</button>
        <button data-f="onl" onclick="setFilter('onl')">Ön Lisans</button>
        <button data-f="lis" onclick="setFilter('lis')">Lisans</button>
      </div>
      <div class="listcount" id="plistcount"></div>
      <div class="list" id="plist"></div>
    </div>

    <!-- COURSE MODE -->
    <div id="pane-ders" style="display:none">
      <div class="sbsearch"><input id="dsearch" type="text" placeholder="Ders adı veya kodu…" autocomplete="off"></div>
      <div class="listcount" id="dlistcount"></div>
      <div class="list" id="dlist"></div>
    </div>
  </aside>

  <main class="main" id="main">
    <div class="welcome" id="welcome">
      <div class="wc">📚</div>
      <h2>Bir program seçin</h2>
      <p>Soldaki listeden bir program seçerek dersleri yarıyıllara göre görüntüleyin. Belirli bir dersi arıyorsanız <b>Ders Ara</b> sekmesini kullanın.</p>
    </div>
    <div id="content" style="display:none"></div>
  </main>
</div>
<div class="scrim" id="scrim" onclick="closeNav()"></div>

,737],[4,18,18],[4,740,738],[4,357,355],[4,335,333],[4,1049,1073],[4,23,23]]],[0,"TURİZM VE OTEL İŞLETMECİLİĞİ",[[1,491,489],[1,1050,1074],[1,504,502],[1,1051,1075],[1,5,5],[2,509,507],[2,1052,1076],[2,1053,1077],[2,700,698],[2,10,10],[3,12,12],[3,496,494],[3,515,513],[3,912,935],[3,17,17],[3,705,703],[4,18,18],[4,518,516],[4,505,503],[4,1054,1078],[4,1055,1079],[4,23,23]]],[0,"TURİZM VE SEYAHAT HİZMETLERİ",[[1,491,489],[1,1050,1074],[1,504,502],[1,1051,1075],[1,5,5],[2,1056,1080],[2,970,993],[2,1053,1077],[2,1057,1081],[2,10,10],[3,12,12],[3,496,494],[3,515,513],[3,148,148],[3,912,935],[3,17,17],[4,18,18],[4,1058,1082],[4,518,516],[4,1055,1079],[4,1059,1083],[4,23,23]]],[0,"TÜRK DİLİ VE KÜLTÜRÜ (SADECE YURTDIŞI)",[[1,1060,1084],[1,1061,1085],[1,1062,1086],[1,1063,1087],[1,1064,694],[2,1065,1088],[2,1066,1089],[2,1067,1090],[2,1068,1091],[2,1069,1092]]],[0,"YAŞLI BAKIMI",[[1,343,1093],[1,353,351],[1,45,45],[1,48,48],[1,1070,1094],[1,5,5],[2,1071,1095],[2,344,342],[2,347,345],[2,10,10],[2,1072,1096],[2,1073,1097],[3,12,12],[3,1074,1098],[3,17,17],[3,1075,1099],[3,1076,1100],[3,1077,1101],[4,18,18],[4,1078,1102],[4,1079,1103],[4,23,23],[4,1080,1104]]],[0,"YEREL YÖNETİMLER",[[1,1031,1055],[1,1081,1105],[1,3,3],[1,28,28],[1,5,5],[2,1082,1106],[2,78,78],[2,10,10],[2,1083,1107],[2,11,11],[3,12,12],[3,804,804],[3,14,14],[3,369,367],[3,17,17],[3,38,38],[4,18,18],[4,20,20],[4,361,359],[4,315,313],[4,23,23],[4,362,360]]],[0,"WEB TASARIMI VE KODLAMA",[[1,645,643],[1,647,645],[1,70,70],[1,5,5],[1,1084,1108],[1,723,721],[2,650,648],[2,638,636],[2,72,72],[2,10,10],[2,725,723],[2,1085,1109],[3,12,12],[3,209,209],[3,1086,1110],[3,1087,1111],[3,17,17],[3,1088,1112],[4,18,18],[4,1089,1113],[4,1090,1114],[4,23,23],[4,1091,1115],[4,1092,1116]]]]};
const DN = DATA.dn, DK = DATA.dk, PR = DATA.pr;

const YCOL = {1:'#4f46e5',2:'#0891b2',3:'#059669',4:'#ca8a04',5:'#ea580c',6:'#dc2626',7:'#7c3aed',8:'#be185d'};
const YNAME = {1:'1. Yarıyıl',2:'2. Yarıyıl',3:'3. Yarıyıl',4:'4. Yarıyıl',5:'5. Yarıyıl',6:'6. Yarıyıl',7:'7. Yarıyıl',8:'8. Yarıyıl'};

// Turkish-aware comparator
const TR='AaBbCcÇçDdEeFfGgĞğHhIıİiJjKkLlMmNnOoÖöPpRrSsŞşTtUuÜüVvYyZz';
const ORD={};[...TR].forEach((c,i)=>ORD[c]=i);
function trcmp(a,b){
  a=a||'';b=b||'';const n=Math.min(a.length,b.length);
  for(let i=0;i<n;i++){const x=ORD[a[i]]??(900+a.charCodeAt(i)),y=ORD[b[i]]??(900+b.charCodeAt(i));if(x!==y)return x-y;}
  return a.length-b.length;
}
// normalize for searching (case + Turkish folding)
function norm(s){
  return (s||'').toLocaleLowerCase('tr')
    .replace(/ı/g,'i').replace(/İ/g,'i').replace(/ş/g,'s').replace(/ğ/g,'g')
    .replace(/ü/g,'u').replace(/ö/g,'o').replace(/ç/g,'c');
}

// Build program objects + flat course index
const PROGRAMS = PR.map((p,idx)=>({
  idx, lisans:p[0]===1, name:p[1],
  dersler:p[2].map(d=>({y:d[0],dn:DN[d[1]],dk:DK[d[2]]}))
})).sort((a,b)=>trcmp(a.name,b.name)||(a.lisans-b.lisans));

const COURSES=[];
PROGRAMS.forEach(p=>p.dersler.forEach(d=>COURSES.push({dn:d.dn,dk:d.dk,y:d.y,prog:p.name,pidx:p.idx,lisans:p.lisans})));

document.getElementById('s-prog').textContent=PROGRAMS.length;
document.getElementById('s-ders').textContent=COURSES.length;

// ---------- state ----------
let mode='prog', filter='all', selected=null;

function esc(s){return s.replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}
function hl(text,q){
  if(!q)return esc(text);
  const nt=norm(text),nq=norm(q),i=nt.indexOf(nq);
  if(i<0)return esc(text);
  return esc(text.slice(0,i))+'<mark>'+esc(text.slice(i,i+q.length))+'</mark>'+esc(text.slice(i+q.length));
}

// ---------- sidebar: program list ----------
function renderPrograms(){
  const q=document.getElementById('psearch').value.trim();
  const nq=norm(q);
  const list=PROGRAMS.filter(p=>{
    if(filter==='lis'&&!p.lisans)return false;
    if(filter==='onl'&&p.lisans)return false;
    return !nq||norm(p.name).includes(nq);
  });
  const box=document.getElementById('plist');
  document.getElementById('plistcount').textContent=list.length+' program';
  if(!list.length){box.innerHTML='<div class="empty">Eşleşen program bulunamadı.</div>';return;}
  box.innerHTML=list.map(p=>`
    <div class="pitem ${selected===p.idx?'on':''}" onclick="selectProgram(${p.idx})">
      <div class="pn">${hl(p.name,q)}</div>
      <div class="pm">
        <span class="deg ${p.lisans?'lis':'onl'}">${p.lisans?'Lisans':'Ön Lisans'}</span>
        <span>${p.dersler.length} ders</span>
      </div>
    </div>`).join('');
}

// ---------- main: program detail ----------
let curDetail=null;
function selectProgram(idx,courseQuery){
  selected=idx;
  curDetail=PROGRAMS.find(p=>p.idx===idx);
  if(mode==='prog')renderPrograms();
  document.getElementById('welcome').style.display='none';
  const c=document.getElementById('content');c.style.display='block';

  const terms={};
  curDetail.dersler.forEach(d=>{(terms[d.y]=terms[d.y]||[]).push(d);});
  const years=Object.keys(terms).map(Number).sort((a,b)=>a-b);

  let termsHtml=years.map(y=>{
    const col=YCOL[y];
    const cards=terms[y].map(d=>`
      <div class="card" style="--cy:${col}" data-n="${esc(norm(d.dn))}" data-k="${esc(norm(d.dk))}">
        <div class="dn">${esc(d.dn)}</div>
        <div class="dk">${esc(d.dk)}</div>
      </div>`).join('');
    return `<div class="term" data-y="${y}">
      <div class="thead"><span class="tdot" style="background:${col}"></span>
        <h3>${YNAME[y]}</h3><span class="tc">${terms[y].length} ders</span></div>
      <div class="cards">${cards}</div></div>`;
  }).join('');

  c.innerHTML=`
    <div class="ph">
      <h1>${esc(curDetail.name)}</h1>
      <div class="phmeta">
        <span class="chip"><span class="deg ${curDetail.lisans?'lis':'onl'}">${curDetail.lisans?'Lisans':'Ön Lisans'}</span></span>
        <span class="chip">Toplam <b>${curDetail.dersler.length}</b> ders</span>
        <span class="chip"><b>${years.length}</b> yarıyıl</span>
      </div>
      <div class="phsearch">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="m20 20-3.5-3.5"/></svg>
        <input id="csearch" type="text" placeholder="Bu programda ders ara…" autocomplete="off">
      </div>
    </div>
    <div class="terms" id="terms">${termsHtml}</div>`;

  c.querySelector('#csearch').addEventListener('input',e=>filterCourses(e.target.value));
  document.getElementById('main').scrollTop=0;
  if(courseQuery){const f=c.querySelector('#csearch');f.value=courseQuery;filterCourses(courseQuery);}
  closeNav();
}

function filterCourses(q){
  const nq=norm(q.trim());
  document.querySelectorAll('#terms .term').forEach(term=>{
    let shown=0;
    term.querySelectorAll('.card').forEach(card=>{
      const hit=!nq||card.dataset.n.includes(nq)||card.dataset.k.includes(nq);
      card.classList.toggle('hide',!hit);
      if(hit){shown++;
        card.querySelector('.dn').innerHTML=hl(card.querySelector('.dn').textContent,q.trim());
        card.querySelector('.dk').innerHTML=hl(card.querySelector('.dk').textContent,q.trim());
      }
    });
    term.style.display=shown?'block':'none';
  });
  const terms=document.getElementById('terms');
  let old=terms.querySelector('.noresult');if(old)old.remove();
  const any=[...terms.querySelectorAll('.term')].some(t=>t.style.display!=='none');
  if(!any)terms.insertAdjacentHTML('beforeend','<div class="noresult">Bu programda eşleşen ders bulunamadı.</div>');
}

// ---------- course-search mode ----------
let kbdIdx=-1, dresults=[];
function renderCourseSearch(){
  const q=document.getElementById('dsearch').value.trim();
  const nq=norm(q);
  const box=document.getElementById('dlist');
  if(!nq){
    dresults=[];kbdIdx=-1;
    document.getElementById('dlistcount').textContent='';
    box.innerHTML='<div class="empty">Aramak için ders adı veya kodu yazın.<br>Bir sonuca tıklayınca ilgili programa geçer.</div>';
    return;
  }
  dresults=COURSES.filter(c=>norm(c.dn).includes(nq)||norm(c.dk).includes(nq)).slice(0,10);
  kbdIdx=-1;
  document.getElementById('dlistcount').textContent=dresults.length?dresults.length+' sonuç (ilk 10)':'';
  if(!dresults.length){box.innerHTML='<div class="empty">Eşleşen ders bulunamadı.</div>';return;}
  box.innerHTML=dresults.map((c,i)=>`
    <div class="citem" data-i="${i}" onclick="pickCourse(${i})">
      <div class="cn">${hl(c.dn,q)}</div>
      <div class="cc">${hl(c.dk,q)} · <span class="cy" style="background:${YCOL[c.y]}">${c.y}. Yarıyıl</span></div>
      <div class="cp">${esc(c.prog)}</div>
    </div>`).join('');
}
function pickCourse(i){
  const c=dresults[i];if(!c)return;
  setMode('prog');
  document.getElementById('psearch').value='';
  selectProgram(c.pidx,c.dn);
}
function moveKbd(dir){
  if(!dresults.length)return;
  kbdIdx=(kbdIdx+dir+dresults.length)%dresults.length;
  document.querySelectorAll('#dlist .citem').forEach((el,i)=>el.classList.toggle('kbd',i===kbdIdx));
  const el=document.querySelector('#dlist .citem.kbd');if(el)el.scrollIntoView({block:'nearest'});
}

// ---------- mode / filter ----------
function setMode(m){
  mode=m;
  document.getElementById('m-prog').classList.toggle('on',m==='prog');
  document.getElementById('m-ders').classList.toggle('on',m==='ders');
  document.getElementById('pane-prog').style.display=m==='prog'?'block':'none';
  document.getElementById('pane-ders').style.display=m==='ders'?'block':'none';
  if(m==='ders'){renderCourseSearch();setTimeout(()=>document.getElementById('dsearch').focus(),0);}
  else renderPrograms();
}
function setFilter(f){
  filter=f;
  document.querySelectorAll('.filters button').forEach(b=>b.classList.toggle('on',b.dataset.f===f));
  renderPrograms();
}
function closeNav(){document.body.classList.remove('nav-open');}

// ---------- events ----------
document.getElementById('psearch').addEventListener('input',renderPrograms);
document.getElementById('dsearch').addEventListener('input',renderCourseSearch);
document.getElementById('dsearch').addEventListener('keydown',e=>{
  if(e.key==='ArrowDown'){e.preventDefault();moveKbd(1);}
  else if(e.key==='ArrowUp'){e.preventDefault();moveKbd(-1);}
  else if(e.key==='Enter'){e.preventDefault();pickCourse(kbdIdx<0?0:kbdIdx);}
});
document.getElementById('mtoggle').addEventListener('click',()=>document.body.classList.toggle('nav-open'));

// init
renderPrograms();
</script>
